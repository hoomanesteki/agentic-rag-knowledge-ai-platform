name: CT

# Continuous Training, distinct from CI. CI runs on every push and asks "is the code correct?".
# CT runs on a cadence (and can be triggered by hand) and asks "as new data and drift arrive, is a
# RETRAINED candidate better, and safe to promote?". It re-optimizes the prompts against the
# ground-truth eval, gates the candidate on held-out accuracy and safety, and PROPOSES a promotion
# as an artifact for a human to approve. It never self-deploys. See mlops/ct.py.
on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      auto_promote:
        description: "Mark a recommended promotion approved (recorded only; CT never deploys)"
        type: boolean
        default: false

# One CT run at a time; do not cancel an in-flight retrain when a manual run overlaps the cron.
concurrency:
  group: continuous-training
  cancel-in-progress: false

jobs:
  continuous-training:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: make setup

      # A cycle runs offline: with no GROQ_API_KEY secret the prompt-optimization training step is
      # skipped and CT runs the eval gate as a health check, so the workflow always produces an
      # auditable report. Wire GROQ_API_KEY as a repo secret to run the full retraining loop.
      - name: Run one CT cycle (retrain, gate, propose promotion)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: ${{ secrets.GROQ_API_KEY && 'groq' || 'fake' }}
        run: |
          make ct CT_ARGS="--scheduled ${{ github.event.inputs.auto_promote == 'true' && '--auto-promote' || '' }}"

      - name: Upload the CT report (the promotion proposal for human review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ct-report
          path: evaluation/reports/ct_report.json
          if-no-files-found: warn
