name: Showcase (GitHub Pages)

# Render the Quarto showcase site and deploy it to GitHub Pages. The site is reproducible from
# source (showcase/*.qmd); no built HTML is committed. Enable Pages for the repo (Settings ->
# Pages -> Source: GitHub Actions) for this to publish.
on:
  push:
    branches: [main]
    paths:
      - "showcase/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # One-time setup: enable Pages in repo Settings -> Pages -> Source: "GitHub Actions".
      # After that, this step reads the config and every push to showcase/ deploys automatically.
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - uses: quarto-dev/quarto-actions/setup@v2
      # The pages run `{python}` chunks that read evaluation/reports/site_stats.json, so rendering
      # needs a Jupyter kernel. Install it from the pinned `docs` extra so CI uses the same versions
      # as a local `make site`, then point Quarto at that interpreter.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install the docs deps (Jupyter kernel for the {python} chunks)
        run: uv sync --extra docs
      - name: Render the showcase
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: quarto render showcase
      - uses: actions/upload-pages-artifact@v3
        with:
          path: showcase/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
