# Domain pack: a fictional athletic apparel ecommerce brand. Synthetic data only.
# The engine reads only this pack. Nothing here should appear in engine code.

name: apparel_ecommerce
brand: Aster Athletics
languages: [en, fr]

# Terms the understand step normalizes before retrieval.
glossary:
  belt bag: [waist bag, fanny pack]
  legging: [tights, leggings]
  hoodie: [sweatshirt, hooded top]

# Canonical node labels. Every one also appears in ontology.cypher.
entity_types:
  - Product
  - Store
  - Supplier
  - Review

# The manifest. This is what makes ingestion domain agnostic.
sources:
  structured:
    - file: seed/structured/products.csv
      role: products
      primary_key: product_id
      grain: one row per product variant (name plus size)
      columns:
        product_id: string
        name: string
        category: string
        gender: string
        size: string
        price: float
        color: string
        colors: string
        weather: string
        stock: int
        supplier_id: string
      pii_columns: []
    - file: seed/structured/stores.csv
      role: stores
      primary_key: store_id
      grain: one row per store
      columns:
        store_id: string
        name: string
        city: string
        country: string
      pii_columns: []
    - file: seed/structured/suppliers.csv
      role: suppliers
      primary_key: supplier_id
      grain: one row per supplier
      columns:
        supplier_id: string
        name: string
        country: string
        material: string
      pii_columns: []
    - file: seed/structured/sales.csv
      role: sales
      primary_key: sale_id
      grain: one row per sale line
      columns:
        sale_id: string
        product_id: string
        store_id: string
        quantity: int
        returned: bool
        sold_at: date
      pii_columns: []
  unstructured:
    - file: seed/unstructured/reviews.jsonl
      doc_type: review
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [product_id, rating, date]
      entity_ref: [product_id]
      context_fields: [product_id]   # embedded with the text as a contextual prefix (M2.4)
      # Entity linking (M5.2): each review becomes a Review node linked to the products it
      # names, matched against the product `name`. Low-confidence links go to a review list.
      mentions:
        node_label: Review
        edge_type: MENTIONS
        target_label: Product
        target_name_property: name
    # Generated reviews, two to four per product (tools/gen_catalog.py). Same shape, so each becomes
    # a Review node linked to its Product, which deepens the graph and feeds product pages.
    - file: seed/unstructured/reviews_generated.jsonl
      doc_type: review
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [product_id, rating, date]
      entity_ref: [product_id]
      context_fields: [product_id]
      mentions:
        node_label: Review
        edge_type: MENTIONS
        target_label: Product
        target_name_property: name
    # Company knowledge: policies and guides (shipping, returns, sizing, care, payment). General
    # store knowledge, not tied to one product, so no entity_ref or graph mentions.
    - file: seed/unstructured/company_knowledge.jsonl
      doc_type: guide
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [category]
    # Catalog facts generated by tools/gen_catalog.py: per gender+category counts, sizes, colors,
    # and price ranges, so the assistant can answer catalog aggregates (what bags for women, price
    # range for hoodies) that plain description retrieval misses.
    - file: seed/unstructured/catalog_facts.jsonl
      doc_type: guide
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [category]
    # Occasion and recommendation guides (summer, winter, gifts, running, travel, city weather) plus
    # meta (who built it, languages, human support), so open-ended shopping questions get an answer.
    - file: seed/unstructured/occasions.jsonl
      doc_type: guide
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [category]
    # Deep sales-expertise guides (tools/gen_expertise.py): gifts by recipient, occasion, and
    # budget; sport-specific outfits (pilates, yoga, running, lifting); events; weather and cities;
    # trends and influencer looks; fit and materials. Named products, so recommendations are concrete.
    - file: seed/unstructured/expertise.jsonl
      doc_type: guide
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [category]
    # Demo order history for one customer, so the assistant can look up orders and reason about a
    # delivery delay when the shopper gives their email (info@esteki.ca), verified with their name.
    - file: seed/unstructured/orders.jsonl
      doc_type: order
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [email]
    # Product descriptions: the marketing copy with materials, fit, and what each piece is good
    # for (weather, activity). This is what the assistant retrieves to recommend a product.
    - file: seed/unstructured/products.jsonl
      doc_type: product
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [product_id, category]
      entity_ref: [product_id]
      context_fields: [product_id]
      mentions:
        node_label: ProductDoc
        edge_type: DESCRIBES
        target_label: Product
        target_name_property: name
    # The wider men/women catalog copy, generated by tools/gen_catalog.py. Same shape as the
    # hand-written descriptions above, so the assistant can recommend across the whole store.
    - file: seed/unstructured/products_catalog.jsonl
      doc_type: product
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [product_id, category, gender]
      entity_ref: [product_id]
      context_fields: [product_id]
      mentions:
        node_label: ProductDoc
        edge_type: DESCRIBES
        target_label: Product
        target_name_property: name

# Knowledge graph (M5): nodes come from gold tables, edges from foreign keys already in the
# data. The engine reads this section and never hardcodes a label or relationship. Labels match
# entity_types and ontology.cypher. `source` is a gold role; keys/properties are its columns.
graph:
  nodes:
    - label: Product
      source: products
      key: product_id
      properties: [name, category, gender, size, price, color, weather, stock]
    - label: Supplier
      source: suppliers
      key: supplier_id
      properties: [name, country, material]
    - label: Store
      source: stores
      key: store_id
      properties: [name, city, country]
  edges:
    - type: SUPPLIES
      from: Supplier
      to: Product
      source: products          # each product row carries its supplier_id
      from_key: supplier_id
      to_key: product_id
    - type: SOLD_AT
      from: Product
      to: Store
      source: sales             # each sale line links a product to a store
      from_key: product_id
      to_key: store_id

defaults:
  top_k_in: 50
  top_n_out: 8
  confidence_high: 0.7
  confidence_low: 0.4

# Starter prompts for the chat UI, one per capability (a product fact, a governed metric, a graph
# relationship, what reviewers say, and a policy), so a new user knows what they can ask. The API
# serves these for the active domain; the engine never hardcodes a question.
suggestions:
  - { text: "How much does the Aster Flow Legging cost?", lang: en, kind: fact }
  - { text: "What is the return rate for size M?", lang: en, kind: metric }
  - { text: "Which supplier makes the Cloud Hoodie?", lang: en, kind: graph }
  - { text: "Do customers say the Flow Legging runs small?", lang: en, kind: reviews }
  - { text: "What is your return policy?", lang: en, kind: policy }
  - { text: "Combien coute le legging Flow ?", lang: fr, kind: fact }
