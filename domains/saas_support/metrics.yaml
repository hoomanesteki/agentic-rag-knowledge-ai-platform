# Governed metrics for saas_support. The AI fills slots through a validated call, never raw
# SQL. The engine runs these on a read-only DuckDB connection (external access off) and rejects
# anything but a SELECT over the gold tables. Use DuckDB named parameters ($name); a missing
# param binds to NULL, which the (... is null or ...) guard turns into "all values".

metrics:
  - name: resolution_rate_by_priority
    grain: ticket priority
    source: tickets
    dimensions: [priority]
    params:
      priority: string
    sql_template: |
      select
        priority,
        sum(case when resolved then 1 else 0 end)::float
          / nullif(count(*), 0) as resolution_rate
      from tickets
      where ($priority is null or priority = $priority)
      group by priority

  - name: open_tickets_by_plan
    grain: plan
    source: tickets
    # Keyed by the plan name, not the opaque plan_id: the slot-fill only sees a user's words
    # ("the Business plan"), and nothing maps that to PL03, so join plans and match on the name.
    dimensions: [plan]
    params:
      plan: string
    sql_template: |
      select
        p.name as plan,
        count(*) as open_tickets
      from tickets t
      join plans p on p.plan_id = t.plan_id
      where t.status = 'open' and ($plan is null or p.name = $plan)
      group by p.name
