# Keep dependencies current so security fixes arrive as small, reviewable PRs instead of a big
# late bump. Weekly, grouped, low-noise. CI (lint, tests, audit) runs on each Dependabot PR.
version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    groups:
      web:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
