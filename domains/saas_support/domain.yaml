# Domain pack: a fictional SaaS help desk for a project-management product. Synthetic data.
# This is the second domain: a stub at M4.4, fleshed out into a full case study at M9.4 (plan-
# specific bilingual articles, an Article-ABOUT-Plan graph, two governed metrics, and a 20-item
# golden set spanning every route, with English and French coverage). It proves the same engine
# serves a different shape of data with no engine code change. The engine reads only this pack.

name: saas_support
brand: Northwind Cloud
languages: [en, fr]

# Terms the understand step normalizes before retrieval. Keep these domain-specific: generic
# app words (like "sign in") belong to the engine UI, not a domain glossary.
glossary:
  seat: [seats, license, licence]
  sso: [single sign-on, single sign on]
  workspace: [tenant, organization, org]

# Canonical node labels. Every one also appears in ontology.cypher.
entity_types:
  - Plan
  - Ticket
  - Article

# The manifest. Same contract as the first domain, different schema, so ingestion,
# the lakehouse, and metrics all stay domain agnostic.
sources:
  structured:
    - file: seed/structured/plans.csv
      role: plans
      primary_key: plan_id
      grain: one row per subscription plan
      columns:
        plan_id: string
        name: string
        tier: string
        monthly_price: float
        seats: int
      pii_columns: []
    - file: seed/structured/tickets.csv
      role: tickets
      primary_key: ticket_id
      grain: one row per support ticket
      columns:
        ticket_id: string
        plan_id: string
        customer_email: string
        priority: string
        status: string
        resolved: bool
        opened_at: date
      # customer_email is masked out of silver and gold; the raw value never leaves bronze.
      pii_columns: [customer_email]
  unstructured:
    - file: seed/unstructured/articles.jsonl
      doc_type: article
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [plan_id, category]
      entity_ref: [plan_id]
      context_fields: [plan_id]   # embedded with the text as a contextual prefix (M2.4)
      # Entity linking (M5.2): each article becomes an Article node linked to the plans it names.
      mentions:
        node_label: Article
        edge_type: ABOUT
        target_label: Plan
        target_name_property: name
    # Company knowledge: how-to guides and policies (onboarding, roles, SSO setup, API keys,
    # billing, data, security). General product knowledge, not tied to one plan.
    - file: seed/unstructured/company_knowledge.jsonl
      doc_type: guide
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [category]

# Knowledge graph (M5): nodes from gold tables, edges from foreign keys in the data. Same
# engine, different schema, so the graph is declared here, never in code.
graph:
  nodes:
    - label: Plan
      source: plans
      key: plan_id
      properties: [name, tier, monthly_price, seats]
    - label: Ticket
      source: tickets
      key: ticket_id
      properties: [priority, status, resolved, opened_at]
  edges:
    - type: ON_PLAN
      from: Ticket
      to: Plan
      source: tickets           # each ticket row carries its plan_id
      from_key: ticket_id
      to_key: plan_id

defaults:
  top_k_in: 50
  top_n_out: 8
  confidence_high: 0.7
  confidence_low: 0.4
