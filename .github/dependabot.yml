# Keep dependencies current so security fixes arrive as small, reviewable PRs instead of a big
# late bump. Weekly, grouped, low-noise. CI (lint, tests, audit) runs on each Dependabot PR.
version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    groups:
      web:
        patterns: ["*"]
    ignore:
      # The storefront stays on its current major lines (Next 14.x, React 18.x). A framework major
      # (Next 16 / React 19) is a deliberate, separately-tested migration, not a weekly auto-PR, so
      # do not re-propose it. Minor and patch updates, including security fixes within the current
      # majors, still flow. Lift this when the migration is scheduled.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
