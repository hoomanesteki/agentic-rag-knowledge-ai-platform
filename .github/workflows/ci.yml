name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: make setup

      - name: Run checks (lint, tests, domain validation, leak check)
        run: make check

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  security:
    # Dependency vulnerability scan. Informational (does not block a merge on a fresh upstream
    # advisory you cannot fix in the moment); Dependabot opens the actual update PRs. Read the
    # job output to see any known CVE in a pinned dependency.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Audit Python dependencies (pip-audit over the locked versions)
        run: |
          uv export --format requirements-txt --no-emit-project --no-hashes > requirements.audit.txt
          uvx pip-audit -r requirements.audit.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Audit web dependencies (high severity and above)
        working-directory: web
        run: npm audit --audit-level=high
