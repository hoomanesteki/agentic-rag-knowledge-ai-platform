# Domain pack identity and the sources manifest.
# The engine reads only this file and its siblings. Nothing here should exist in engine code.

name: CHANGE_ME              # must match the folder name under domains/
languages: [en]              # add more codes as you add translated content, e.g. [en, fr]

# Terms the understand step normalizes before retrieval.
glossary:
  # canonical_term: [synonym, abbreviation, misspelling]
  example_term: [ex, exmpl]

# Canonical node labels. Every one must also appear in ontology.cypher.
entity_types:
  - Product
  - Store
  - Supplier
  - Review

# The manifest. This is what makes ingestion domain agnostic.
sources:
  structured:
    - file: seed/structured/products.csv
      role: products
      primary_key: product_id
      grain: one row per product
      columns:
        product_id: string
        name: string
        category: string
        size: string
        price: float
      pii_columns: []
    - file: seed/structured/sales.csv
      role: sales
      primary_key: sale_id
      grain: one row per sale line
      columns:
        sale_id: string
        product_id: string
        store_id: string
        quantity: int
        returned: bool
        sold_at: date
      pii_columns: []
  unstructured:
    - file: seed/unstructured/reviews.jsonl
      doc_type: review
      id_field: id
      text_field: text
      lang_field: lang
      meta_fields: [product_id, rating, date]
      entity_ref: [product_id]   # links this text to a structured entity

# Optional per topic tuning. Safe to delete if you want engine defaults.
defaults:
  top_k_in: 50
  top_n_out: 8
  confidence_high: 0.7
  confidence_low: 0.4
