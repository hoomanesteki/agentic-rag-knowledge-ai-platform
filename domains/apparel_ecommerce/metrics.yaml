# Governed metrics. The AI fills slots through a validated call, never raw SQL.
# Every source traces to a role in the domain.yaml manifest. The engine runs these on a
# read-only DuckDB connection (external access off) and rejects anything but a SELECT over the
# gold tables. Use DuckDB named parameters ($name); missing params bind to NULL.

metrics:
  - name: return_rate_by_size
    grain: product size
    source: sales
    dimensions: [size]
    params:
      size: string
    sql_template: |
      select
        p.size as size,
        sum(case when s.returned then 1 else 0 end)::float
          / nullif(count(*), 0) as return_rate
      from sales s
      join products p on p.product_id = s.product_id
      where ($size is null or p.size = $size)
      group by p.size

  - name: units_sold
    grain: product
    source: sales
    dimensions: [product_id]
    params:
      product_id: string
    sql_template: |
      select
        s.product_id,
        sum(s.quantity) as units_sold
      from sales s
      where ($product_id is null or s.product_id = $product_id)
      group by s.product_id

  # Per-size stock so "is the Flow Legging in stock in medium" is answered from the gold table,
  # not guessed. Common size words (medium, small, large) map to the S/M/L/XL codes.
  - name: stock_by_size
    grain: product size
    source: products
    dimensions: [name, size]
    params:
      product: string
      size: string
    sql_template: |
      select
        p.name as product,
        p.size as size,
        sum(p.stock) as units_in_stock
      from products p
      where ($product is null or lower(p.name) like '%' || lower($product) || '%')
        and (
          $size is null
          or upper(p.size) = upper($size)
          or (lower($size) in ('medium', 'med') and p.size = 'M')
          or (lower($size) in ('small', 'sm') and p.size = 'S')
          or (lower($size) in ('large', 'lg') and p.size = 'L')
          or (lower($size) in ('extra large', 'x-large', 'xl', 'x large') and p.size = 'XL')
          or (lower($size) in ('extra small', 'x-small', 'xs') and p.size = 'XS')
          or (lower($size) in ('one size', 'os', 'onesize') and p.size = 'OS')
        )
      group by p.name, p.size
      order by p.name, p.size
