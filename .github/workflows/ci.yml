name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: make setup

      - name: Run checks (lint, tests, domain validation, leak check)
        run: make check

      - name: Eval gate (blocks a retrieval/abstain regression on recorded fixtures)
        run: make gate

  dbt:
    # The semantic layer: build the dbt medallion for both domains so the schema, relationships,
    # and PII-masking governance tests run in CI, then assert parity, well-formed metrics, and a
    # deterministic build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (with the dbt extra)
        run: uv sync --extra dbt --extra dev

      - name: Build and test the dbt semantic layer (both domains)
        run: |
          make dbt-build DOMAIN=apparel_ecommerce
          make dbt-build DOMAIN=saas_support

      - name: Parity test (dbt gold matches the in-app builder)
        run: PYTHONPATH=. uv run pytest tests/test_dbt_parity.py -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  security:
    # Dependency vulnerability scan. Informational (does not block a merge on a fresh upstream
    # advisory you cannot fix in the moment); Dependabot opens the actual update PRs. Read the
    # job output to see any known CVE in a pinned dependency.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Audit Python dependencies (pip-audit over the locked versions)
        run: |
          uv export --format requirements-txt --no-emit-project --no-hashes > requirements.audit.txt
          uvx pip-audit -r requirements.audit.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Audit web dependencies (high severity and above)
        working-directory: web
        run: npm audit --audit-level=high
